name: Build and push image

# Builds the multi-arch container image and pushes it to Docker Hub on every push to
# main (tag: latest + short SHA) and on version tags like v1.2.3 (tag: semver). Manual
# runs are available via the Actions tab.
#
# Required repository secrets (add them under Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  your Docker Hub account (also used as the image namespace)
#   DOCKERHUB_TOKEN     a Docker Hub access token with read/write scope
#
# If your image namespace differs from the login username (e.g. an organisation), change
# IMAGE_NAME below accordingly.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/docs-sign

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` can derive the build version.
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          echo "value=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            COMMIT=${{ steps.version.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the Docker Hub tag a clean multi-arch manifest (no extra
          # "unknown/unknown" attestation entries).
          provenance: false
